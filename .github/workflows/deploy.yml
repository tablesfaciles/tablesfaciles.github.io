name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📁 Checkout du code
        uses: actions/checkout@v4

      - name: 🟢 Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Installation des dépendances
        run: npm ci

      - name: 🏗️ Build (Tailwind & JS)
        run: |
          npm run prod
          # On crée un fichier vide pour être sûr que vendor n'est pas vide
          touch vendor/.keep

      - name: 🔖 Versioning & Cache Busting
        run: |
          VERSION=$(date +%Y%m%d%H%M)
          echo "Nouvelle version : $VERSION"

          # Remplacement dans tous les HTML
          find . -name "*.html" -exec sed -i "s/v=[0-9]\+/v=$VERSION/g" {} \;

          # Remplacement dans sw.js
          sed -i "s/multiplication-app-[0-9]\+/multiplication-app-$VERSION/g" sw.js

          echo "----- CHECK HTML -----"
          grep "v=$VERSION" index.html || true
          echo "----- CHECK SW -----"
          grep "$VERSION" sw.js || true

      - name: 🚀 Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
